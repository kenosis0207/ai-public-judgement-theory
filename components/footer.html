        <script defer data-name="footer-logic">
          document.addEventListener('DOMContentLoaded', function() {
            (function(){
              const newsletterForm = document.querySelector(".footer-newsletter-form")
              if (newsletterForm) {
                newsletterForm.addEventListener("submit", (e) => {
                  const input = newsletterForm.querySelector(".footer-input")
                  if (input && input.checkValidity()) {
                    const originalText = newsletterForm.querySelector(".footer-submit-btn span").textContent
                    const btn = newsletterForm.querySelector(".footer-submit-btn")

                    btn.disabled = true
                    btn.querySelector("span").textContent = "Subscribed"
                    input.value = ""

                    setTimeout(() => {
                      btn.disabled = false
                      btn.querySelector("span").textContent = originalText
                    }, 3000)
                  }
                })
              }
            })()
          });
